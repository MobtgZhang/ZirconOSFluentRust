<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="handShadow">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Hand pointer -->
  <g filter="url(#handShadow)">
    <!-- Index finger -->
    <rect x="13" y="2" width="5" height="14" rx="2.5" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <!-- Palm -->
    <path d="M7,17 Q7,14 9,14 L9,18 L7,18 Z" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <rect x="9" y="12" width="4" height="12" rx="2" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <rect x="18" y="12" width="4" height="12" rx="2" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <rect x="22" y="14" width="4" height="10" rx="2" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
    <!-- Palm body -->
    <rect x="7" y="18" width="19" height="8" rx="3" fill="white" stroke="#1a1a1a" stroke-width="0.8"/>
    <!-- Wrist -->
    <rect x="9" y="26" width="14" height="4" rx="1" fill="white" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
</svg>
