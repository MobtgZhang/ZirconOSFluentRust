<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="moveShadow">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#moveShadow)">
    <!-- Up arrow -->
    <polygon points="16,3 12,8 14,8 14,14 18,14 18,8 20,8" fill="white" stroke="#1a1a1a" stroke-width="0.6" stroke-linejoin="round"/>
    <!-- Down arrow -->
    <polygon points="16,29 12,24 14,24 14,18 18,18 18,24 20,24" fill="white" stroke="#1a1a1a" stroke-width="0.6" stroke-linejoin="round"/>
    <!-- Left arrow -->
    <polygon points="3,16 8,12 8,14 14,14 14,18 8,18 8,20" fill="white" stroke="#1a1a1a" stroke-width="0.6" stroke-linejoin="round"/>
    <!-- Right arrow -->
    <polygon points="29,16 24,12 24,14 18,14 18,18 24,18 24,20" fill="white" stroke="#1a1a1a" stroke-width="0.6" stroke-linejoin="round"/>
  </g>
</svg>
