<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="busyShadow">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Spinning circle -->
  <g filter="url(#busyShadow)">
    <circle cx="16" cy="16" r="10" fill="none" stroke="#e0e0e0" stroke-width="2.5" opacity="0.3"/>
    <!-- Active arc -->
    <path d="M16,6 A10,10 0 0,1 26,16" fill="none" stroke="#0078d4" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Secondary arc -->
    <path d="M16,26 A10,10 0 0,1 6,16" fill="none" stroke="#60cdff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
