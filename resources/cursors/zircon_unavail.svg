<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="unavailShadow">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#unavailShadow)">
    <!-- Circle -->
    <circle cx="16" cy="16" r="10" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Diagonal strike -->
    <line x1="9" y1="9" x2="23" y2="23" stroke="#c42b1c" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Inner circle for depth -->
    <circle cx="16" cy="16" r="10" fill="none" stroke="#c42b1c" stroke-width="1.5"/>
  </g>
</svg>
