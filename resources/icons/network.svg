  <line x1="5" y1="16" x2="27" y2="16" stroke="#60cdff" stroke-width="0.5" opacity="0.3"/>
  <ellipse cx="16" cy="21" rx="9" ry="2.5" fill="none" stroke="#60cdff" stroke-width="0.5" opacity="0.3"/>
  <!-- Connection nodes -->
  <circle cx="10" cy="12" r="1.5" fill="#0078d4" opacity="0.7"/>
  <circle cx="22" cy="12" r="1.5" fill="#0078d4" opacity="0.7"/>
