  <!-- Connection lines -->
  <line x1="10" y1="12" x2="22" y2="12" stroke="#60cdff" stroke-width="0.4" opacity="0.3"/>
  <line x1="10" y1="12" x2="16" y2="22" stroke="#60cdff" stroke-width="0.4" opacity="0.3"/>
  <line x1="22" y1="12" x2="16" y2="22" stroke="#60cdff" stroke-width="0.4" opacity="0.3"/>
</svg>
