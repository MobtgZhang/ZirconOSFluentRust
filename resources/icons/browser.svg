<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Browser window -->
  <rect x="3" y="3" width="26" height="26" rx="2" fill="#1e1e1e" stroke="#444" stroke-width="0.6"/>
  <!-- Tab bar -->
  <rect x="3" y="3" width="26" height="5" rx="2" fill="#2d2d2d"/>
  <!-- Active tab -->
  <rect x="5" y="4" width="10" height="4" rx="1" fill="#383838"/>
  <!-- URL bar -->
  <rect x="5" y="10" width="22" height="3" rx="1" fill="#383838"/>
  <circle cx="7" cy="11.5" r="0.8" fill="#0078d4" opacity="0.6"/>
  <!-- Page content area -->
  <rect x="5" y="15" width="22" height="12" fill="#252525"/>
  <!-- Content blocks -->
  <rect x="7" y="17" width="8" height="4" rx="0.5" fill="#0078d4" opacity="0.2"/>
  <rect x="17" y="17" width="8" height="4" rx="0.5" fill="#383838"/>
  <line x1="7" y1="23" x2="25" y2="23" stroke="#444" stroke-width="0.6"/>
  <line x1="7" y1="25" x2="20" y2="25" stroke="#444" stroke-width="0.6"/>
</svg>
