<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Calculator body -->
  <rect x="7" y="3" width="18" height="26" rx="2" fill="#2d2d2d" stroke="#555" stroke-width="0.6"/>
  <!-- Display -->
  <rect x="9" y="5" width="14" height="6" rx="1" fill="#1e1e1e"/>
  <text x="21" y="10" font-family="monospace" font-size="5" fill="#60cdff" text-anchor="end" opacity="0.8">0</text>
  <!-- Button grid -->
  <g fill="#383838">
    <rect x="9" y="13" width="4" height="3" rx="0.5"/>
    <rect x="14" y="13" width="4" height="3" rx="0.5"/>
    <rect x="19" y="13" width="4" height="3" rx="0.5"/>
    <rect x="9" y="17.5" width="4" height="3" rx="0.5"/>
    <rect x="14" y="17.5" width="4" height="3" rx="0.5"/>
    <rect x="19" y="17.5" width="4" height="3" rx="0.5"/>
    <rect x="9" y="22" width="4" height="3" rx="0.5"/>
    <rect x="14" y="22" width="4" height="3" rx="0.5"/>
  </g>
  <!-- Equals button accent -->
  <rect x="19" y="22" width="4" height="3" rx="0.5" fill="#0078d4" opacity="0.6"/>
</svg>
