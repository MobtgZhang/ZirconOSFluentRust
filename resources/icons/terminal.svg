<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Terminal window -->
  <rect x="3" y="4" width="26" height="24" rx="2" fill="#1e1e1e" stroke="#0078d4" stroke-width="0.8"/>
  <!-- Title bar -->
  <rect x="3" y="4" width="26" height="4" rx="2" fill="#2d2d2d"/>
  <!-- Traffic dots -->
  <circle cx="7" cy="6" r="1" fill="#ff5f57" opacity="0.7"/>
  <circle cx="11" cy="6" r="1" fill="#febc2e" opacity="0.7"/>
  <circle cx="15" cy="6" r="1" fill="#28c840" opacity="0.7"/>
  <!-- Prompt -->
  <text x="6" y="14" font-family="monospace" font-size="4" fill="#60cdff" opacity="0.9">Z:\&gt;</text>
  <!-- Command text -->
  <line x1="18" y1="12" x2="24" y2="12" stroke="#aaa" stroke-width="0.8" opacity="0.5"/>
  <!-- Output lines -->
  <line x1="6" y1="17" x2="22" y2="17" stroke="#888" stroke-width="0.6" opacity="0.3"/>
  <line x1="6" y1="20" x2="18" y2="20" stroke="#888" stroke-width="0.6" opacity="0.3"/>
  <!-- Blinking cursor -->
  <rect x="6" y="22" width="3" height="1.5" fill="#0078d4" opacity="0.8"/>
</svg>
