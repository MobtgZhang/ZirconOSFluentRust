<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Calendar body -->
  <rect x="4" y="5" width="24" height="24" rx="2" fill="#2d2d2d" stroke="#555" stroke-width="0.6"/>
  <!-- Header -->
  <rect x="4" y="5" width="24" height="7" rx="2" fill="#0078d4" opacity="0.6"/>
  <!-- Binding rings -->
  <rect x="10" y="3" width="2" height="5" rx="0.5" fill="#555"/>
  <rect x="20" y="3" width="2" height="5" rx="0.5" fill="#555"/>
  <!-- Month text area -->
  <line x1="10" y1="9" x2="22" y2="9" stroke="white" stroke-width="1" opacity="0.6"/>
  <!-- Date grid -->
  <g fill="#60cdff" opacity="0.3" font-size="3">
    <rect x="7" y="15" width="3" height="3" rx="0.3"/>
    <rect x="12" y="15" width="3" height="3" rx="0.3"/>
    <rect x="17" y="15" width="3" height="3" rx="0.3"/>
    <rect x="22" y="15" width="3" height="3" rx="0.3"/>
    <rect x="7" y="20" width="3" height="3" rx="0.3"/>
    <rect x="12" y="20" width="3" height="3" rx="0.3"/>
    <rect x="22" y="20" width="3" height="3" rx="0.3"/>
    <rect x="7" y="25" width="3" height="3" rx="0.3"/>
  </g>
  <!-- Today highlight -->
  <rect x="17" y="20" width="3" height="3" rx="0.3" fill="#0078d4" opacity="0.7"/>
</svg>
