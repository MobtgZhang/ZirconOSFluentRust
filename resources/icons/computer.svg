<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60cdff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0078d4" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <!-- Monitor frame -->
  <rect x="4" y="3" width="24" height="18" rx="2" fill="#2d2d2d" stroke="#0078d4" stroke-width="1"/>
  <!-- Screen -->
  <rect x="6" y="5" width="20" height="14" rx="1" fill="url(#screen)"/>
  <!-- Z logo on screen -->
  <path d="M12 9 L20 9 L13 15 L20 15" fill="none" stroke="#60cdff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Stand -->
  <rect x="13" y="21" width="6" height="3" rx="0.5" fill="#444"/>
  <!-- Base -->
  <ellipse cx="16" cy="26" rx="7" ry="2" fill="#383838"/>
  <!-- Accent LED -->
  <circle cx="16" cy="20" r="0.6" fill="#0078d4" opacity="0.8"/>
</svg>
