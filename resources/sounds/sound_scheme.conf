# ZirconOS Fluent Sound Scheme
# Maps system events to sound file identifiers.
# In kernel mode, sounds are synthesized by the AC97/audio driver from
# embedded PCM samples or procedurally generated waveforms.

[SoundScheme]
Name=ZirconOS Fluent
Version=1.0

[Events]
Startup=zircon_startup_fluent
Logon=zircon_logon_fluent
Logoff=zircon_logoff_fluent
Shutdown=zircon_shutdown_fluent
CriticalStop=zircon_critical
Exclamation=zircon_exclamation
Question=zircon_question
Asterisk=zircon_asterisk
DefaultBeep=zircon_default
Notification=zircon_notification
MessageNudge=zircon_nudge
DeviceConnect=zircon_device_connect
DeviceDisconnect=zircon_device_disconnect
NavigationStart=zircon_nav_start
NavigationBack=zircon_nav_back
